name: Auto Version Bump

on:
  push:
    branches: [main]
    paths:
      - 'cybersh_direct.py'
      - 'requirements.txt'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version
        run: |
          # read current version from version.txt
          CURRENT=$(cat version.txt 2>/dev/null || echo "1.0")

          # split into major.minor
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)

          # bump minor version
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="$MAJOR.$NEW_MINOR"

          echo "Bumping $CURRENT → $NEW_VERSION"

          # write new version.txt
          echo "$NEW_VERSION" > version.txt

          # update the version comment in cybersh_direct.py (line 2)
          sed -i "s/^# version: .*/# version: $NEW_VERSION/" cybersh_direct.py

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt cybersh_direct.py
          git diff --staged --quiet || git commit -m "🔖 auto-bump version to $(cat version.txt)"
          git push
